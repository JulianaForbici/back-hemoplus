swagger: '2.0'

info:
  version: 0.0.1
  title: my_service
  x-senior-domain: my_domain
  x-senior-domain-path: my_domain
  x-senior-service-path: my_service
  contact:
    name: Senior X Platform
    url: https://dev.senior.com.br
    email: seniorx-dev@senior.com.br

host: api.senior.com.br

basePath: /my_domain/my_service/

securityDefinitions:
   bearerAuth:
     type: apiKey
     in: header
     name: Authorization

produces:
  - application/json
consumes:
  - application/json

paths:
  
definitions:
  fatorRh:
    description: "enumeracoes de dominio"
    type: string
    enum:
      - NEGATIVO
      - POSITIVO
    
  
  tipoSangue:
    description: ""
    type: string
    enum:
      - A
      - B
      - AB
      - O
    
  
  tipoUsuario:
    description: ""
    type: string
    enum:
      - DOADOR
      - ADMIN
    
  
  statusAgendamento:
    description: ""
    type: string
    enum:
      - PENDENTE
      - CONFIRMADO
      - CANCELADO
      - COMPARECEU
      - NAO_COMPARECEU
    
  
  userNotificationKind:
    description: "User notification kind."
    type: string
    enum:
      - Operational
      - Management
      - News
    
  
  userNotificationPriority:
    description: "User notification priority."
    type: string
    enum:
      - Error
      - Alert
      - None
    
  
  eventEmailFormat:
    description: "Format of the email"
    type: string
    enum:
      - HTML
      - PLAIN_TEXT
    
  
  fieldType:
    description: ""
    type: string
