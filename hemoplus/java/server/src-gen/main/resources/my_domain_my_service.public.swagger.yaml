      - BINARY
      - BOOLEAN
      - DATE
      - DATETIME
      - LOCALDATETIME
      - DOUBLE
      - ENUM
      - INTEGER
      - MONEY
      - STRING
      - TIME
    
  
  fileFormat:
    description: ""
    type: string
    enum:
      - CSV
      - FLAT
      - JSON
      - XML
    
  
  hookFunction:
    description: ""
    type: string
    enum:
      - BEFORE_PARSE
      - BEFORE_CONVERSION
      - ON_ERROR
      - VALIDATE
    
  
  eventType:
    description: ""
    type: string
    enum:
      - CHUNK
      - DOWNLOAD
      - ERROR
      - FINISH
      - START
    
  
  errorStrategy:
    description: ""
    type: string
    enum:
      - CALL_SCRIPT
      - IGNORE
      - STOP
    
  
  status:
    description: ""
    type: string
    enum:
      - DONE
      - DONE_WITH_ERRORS
      - DOWNLOADING
      - ERROR
      - NOT_STARTED
      - RUNNING
    
  
  errorType:
    description: ""
    type: string
    enum:
      - CONVERT_ERROR
      - SERVICE_ERROR
    
  retorno:
    description: "records de apoio"
    type: object
    required:
      - mensagem
    properties:
      mensagem:
        type: string
        description: ""
      codigo:
        type: string
        description: ""
      contemErro:
        type: boolean
        description: ""
        default: false
  
  pontoMapa:
    description: ""
    type: object
    required:
      - id
      - tipo
      - latitude
      - longitude
    properties:
      id:
        type: string
        description: ""
      tipo:
        type: string
        description: ""
      nome:
        type: string
        description: ""
      latitude:
        type: number
        format: double
        description: ""
      longitude:
        type: number
        format: double
        description: ""
  
  dadosMapa:
    description: ""
